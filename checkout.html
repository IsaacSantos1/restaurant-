<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <nav>
        <a href="home.html">
            <img src="Assets/logo.png" alt="Parrilla Mexicana Logo">
        </a>
        <ul class="navul">
            <li><a href="job.html">Jobs</a></li>
            <li><a href="order.html">Order Now</a></li>
        </ul>
    </nav>

    <div class="title1">
        <h1>Complete Your Order</h1>
    </div>

    <div class="checkout-container">
        <form class="checkout-form">
            <h2>Billing Information</h2>
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
            </div>

            <h2>Shipping Address</h2>
            <div class="form-group">
                <label for="address">Street Address:</label>
                <input type="text" id="address" name="address" placeholder="Enter your street address" required>
            </div>

            <div class="form-group">
                <label for="city">City:</label>
                <input type="text" id="city" name="city" placeholder="Enter your city" required>
            </div>

            <div class="form-group">
                <label for="state">State:</label>
                <input type="text" id="state" name="state" placeholder="Enter your state" required>
            </div>

            <div class="form-group">
                <label for="zip">Zip Code:</label>
                <input type="text" id="zip" name="zip" placeholder="Enter your zip code" required>
            </div>

            <h2>Payment Information</h2>
            <div class="form-group">
                <label for="card-name">Name on Card:</label>
                <input type="text" id="card-name" name="card-name" placeholder="Enter the name on your card" required>
            </div>

            <div class="form-group">
                <label for="card-number">Card Number:</label>
                <input type="text" id="card-number" name="card-number" placeholder="Enter your card number" required>
            </div>

            <div class="form-group">
                <label for="expiry">Expiry Date:</label>
                <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>
            </div>

            <div class="form-group">
                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" name="cvv" placeholder="Enter your CVV" required>
            </div>

            <button type="submit">Place Order</button>
        </form>
    </div>

    <footer>
        <img src="Assets/logo.png" alt="Footer Image" class="footer-image">
        <ul class="footerul">
            <li><a href="job.html">Jobs</a></li>
            <li><a href="Menu.html">Menu</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </footer>

    <script type="module" src="checkout.js"></script>
</body>
</html>
