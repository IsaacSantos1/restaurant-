<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Signup</title>
    <link rel="stylesheet" href="employeesignup.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="home.html">
            <img src="Assets/logo.png" alt="Parrilla Mexicana Logo">
        </a>
        <ul class="navul">
            <li><a href="employeelogin.html">Log In</a></li>
        </ul>
    </nav>

    <div class="signup-container">
        <form id="signupForm">
            <h1>Employee Signup</h1>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <label for="occupation">Occupation</label>
            <select id="occupation" required>
                <option value="none">Select Occupation</option>
                <option value="waiter">Waiter/Waitress</option>
                <option value="chef">Chef</option>
                <option value="management">Management</option>
            </select>

            <button type="submit">Sign Up</button>
        </form>
    </div>

    <footer>
        <img src="Assets/logo.png" alt="Footer Image" class="footer-image">
        <ul class="footerul">
            <li><a href="job.html">Jobs</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </footer>

    <script type="module" src="employeesignup.js"></script>
</body>
</html>
