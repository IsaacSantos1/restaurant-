<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>
    <link rel="stylesheet" href="employeelogin.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="home.html">
            <img src="Assets/logo.png" alt="Parrilla Mexicana Logo">
        </a>
        <ul class="navul">
            <li><a href="employeesignup.html">Sign Up</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <form id="loginForm">
            <h1>Employee Login</h1>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Log In</button>
        </form>
    </div>

    <footer>
        <img src="Assets/logo.png" alt="Footer Image" class="footer-image">
        <ul class="footerul">
            <li><a href="job.html">Jobs</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </footer>

    <script type="module" src="employeelogin.js"></script>
</body>
</html>
